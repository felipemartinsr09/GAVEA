<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="cadastro.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - GAVEA</title>
</head>
<body>
    <h1>GAVEA - Gestão e agrupamento de vagas de estágio aplicadas</h1>

    <h2>FAÇA SEU CADASTRO</h2>
    <form id="form-cadastro">
    <div class="nome-container field-container">
        <label for="nome-cadastro">Digite seu nome completo</label>
        <input type="text" id="nome-cadastro" required>
    </div>
    <div class="email-container field-container">
        <label for="email-cadastro">Digite seu email</label>
        <input type="email" id="email-cadastro" required>
    </div>
    <div class="senha-container field-container">
        <label for="senha-cadastro">Digite uma senha</label>
        <input type="password" id="senha-cadastro" required>
    </div>
    <div class="senha-container field-container">
        <label for="confirmar-senha">Confirme sua senha</label>
        <input type="password" id="confirmar-senha" required>
    </div>
    
    <input type="submit" id="btn-cadastrar" value="Cadastrar">
</form>
<script src="script.js"></script>
</body>
</html>
