<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAVEA - Login</title>
</head>
<body>
    <h1>FAÇA SEU LOGIN</h1>
    <form id="login-form">
        <div class="email-container field-container">
            <label for="email-login">Digite seu email</label>
            <input type="email" id="email-login" required>
        </div>

        <div class="senha-container field-container">
            <label for="senha-login">Digite sua senha</label>
            <input type="password" id="senha-login" required>
        </div>
        
        <div class="nav-links">
            <a href="cadastro.html">Criar conta</a>
            <a href="recuperacao.html">Esqueci minha senha</a>
        </div>
        
        <input type="submit" id="btn-login" value="Entrar">
    </form>

    <script src="script.js"></script>
</body>
</html>
